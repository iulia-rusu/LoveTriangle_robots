seed: 7

simulation:
  dt: 0.08
  max_steps: 2000
  condition: orbit # red_only, green_only, separated, blocking, crossing, orbit

arena:
  width: 180.0
  height: 240.0


vehicle:
  start_x: 0.0
  start_y: 0.0
  start_heading: 0.0
  radius: 10.0
  wheel_base: 0.3
  max_linear_speed: 20.0
  motor_clip: 1.0

  # DQN action grid
  action_step: 20.0
  # This gives motor values [-20, 0, 20], so 9 actions total.
  # Alternative:
  # motor_values: [-20, 0, 20]

training:
  out_dir: outputs/dqn
  run_name: null
  episodes: 10
  cpu: false

  batch_size: 128
  memory_size: 10000
  gamma: 0.99
  eps_start: 0.9
  eps_end: 0.01
  eps_decay: 50000
  tau: 0.005
  lr: 0.0003
  hidden_dim: 128

  env_action_mode: index

  random_start: true
  start_margin: 15.0
  random_heading: true

  save_every: 2
  rollout_every: 2

policy_run:
  steps: null
  random_start: false
  start_margin: 15.0
  random_heading: true
  render: false
  pixels_per_unit: 2
  out: outputs/dqn/figures/policy_rollout.png

multi_run:
  configs:
    - config/config.yaml
  conditions:
    - blocking
    - orbit
    - separated
  seeds:
    - 7
  episodes: 5000
  out_root: outputs/dqn_runs
  random_start: true
  start_margin: 15.0
  random_heading: true
  sweeps: {}

render:
  enabled: true
  fps: 60
  pixels_per_unit: 2
  show_sensor_rays: true
  show_text: true

logging:
  enabled: true
  log_dir: data/logs
  model_dir: outputs/models
  figure_dir: outputs/figures
