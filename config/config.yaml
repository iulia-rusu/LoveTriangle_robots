seed: 7

simulation:
  dt: 0.08
  max_steps: 2000
  condition: blocking # red_only, green_only, separated, blocking, crossing, orbit

arena:
  width: 180.0
  height: 240.0


vehicle:
  start_x: 0.0
  start_y: 0.0
  start_heading: 0.0
  radius: 10
  wheel_base: 0.3
  max_linear_speed: 20.0
  motor_clip: 1

render:
  enabled: true
  fps: 60
  pixels_per_unit: 95
  show_sensor_rays: true
  show_text: true

logging:
  enabled: true
  log_dir: data/logs
  model_dir: outputs/models
  figure_dir: outputs/figures