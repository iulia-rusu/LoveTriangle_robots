seed: 7

simulation:
  dt: 0.08
  max_steps: 2000
  condition: separated, orbit # red_only, green_only, separated, blocking, crossing, orbit

arena:
  width: 180.0
  height: 240.0

reward:
  green_hit_threshold: 20.0   # distance from green within which the green bonus applies
  green_hit_bonus: 1000.0
  green_shaping_coef: 1000     # per-unit-distance penalty for being far from green (always applied)
  red_hit_threshold: 20.0     # distance from red within which the red penalty applies
  red_hit_penalty: 1000.0
  red_shaping_coef: 1000   # per-unit-distance bonus for being far from red (always applied)
  wall_threshold: 40.0        # distance from the nearest wall within which the wall penalty applies
  wall_penalty_coef: 500.0


vehicle:
  start_x: 0.0
  start_y: 0.0
  start_heading: 0.0
  radius: 20.0
  wheel_base: 0.3
  max_linear_speed: 30.0
  motor_clip: 1.0

  # DQN action grid (step is hardcoded to 20 in BraitenbergEnv.make_action,
  # action_step below is currently unused)
  action_step: 20.0
  # This gives motor values [-60, -40, -20, 0, 20, 40, 60], so 49 actions total.

training:
  out_dir: outputs/dqn_noise
  run_name: null
  episodes: 10000
  cpu: false

  batch_size: 256
  memory_size: 10000
  gamma: 0.95
  eps_start: 0.9
  eps_end: 0.01
  eps_decay: 50000
  tau: 0.005
  lr: 0.0003
  hidden_dim: 128

  env_action_mode: index

  random_start: true
  start_margin: 15.0
  random_heading: true

  save_every: 1000
  rollout_every: 1000

policy_run:
  steps: null
  random_start: false
  start_margin: 15.0
  random_heading: true
  render: false
  pixels_per_unit: 2
  out: outputs/dqn/figures/policy_rollout.png

multi_run:
  configs:
    - config/config.yaml
  conditions:
    - random
  seeds:
    - 7
  episodes: 100000
  out_root: outputs/dqn_runs
  random_start: true
  start_margin: 15.0
  random_heading: true
  multi_condition: true
  parallel: 4
  sweeps:
  




render:
  enabled: true
  fps: 60
  pixels_per_unit: 2
  show_sensor_rays: true
  show_text: true

logging:
  enabled: true
  log_dir: data/logs
  model_dir: outputs/models
  figure_dir: outputs/figures
